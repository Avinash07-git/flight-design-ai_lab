<div class="space-y-3">
  <!-- Question bubble -->
  <div class="flex justify-end">
    <div class="bg-indigo-600 text-white text-sm px-4 py-3 rounded-2xl rounded-tr-sm max-w-sm">
      {{ question }}
    </div>
  </div>
  <!-- Answer bubble -->
  <div class="flex justify-start gap-3">
    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0 text-sm">🤖</div>
    <div class="bg-white border border-slate-200 text-slate-700 text-sm px-4 py-3 rounded-2xl rounded-tl-sm max-w-sm shadow-sm leading-relaxed">
      {{ answer }}
    </div>
  </div>
</div>
