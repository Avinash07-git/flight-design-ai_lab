<div class="mt-3 bg-slate-50 border border-slate-200 rounded-xl p-4">
  <div class="flex items-center justify-between mb-2">
    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">{{ label }}</p>
    <button
      onclick="navigator.clipboard.writeText(document.getElementById('draft-{{ label | replace(' ', '-') | lower }}').innerText);
               this.innerText='✅ Copied!'; setTimeout(()=>this.innerText='📋 Copy',2000)"
      class="text-xs bg-white border border-slate-300 hover:bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg transition-colors font-medium">
      📋 Copy
    </button>
  </div>
  <p id="draft-{{ label | replace(' ', '-') | lower }}"
     class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{{ draft }}</p>
</div>
